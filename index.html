      { label: '否', value: 0, cause: 'F' },
      { label: '是', value: 1, cause: 'F' }
    ]
  };

  var Q15 = {
    displayNum: '第 15 题', text: '平时多久做一次视力检查？',
    options: [
      { label: '每半年至少一次', value: 0, cause: 'G' },
      { label: '每年一次', value: 1, cause: 'G' },
      { label: '视力不好才去', value: 2, cause: 'G' },
      { label: '从来没做过检查', value: 3, cause: 'G' }
    ]
  };

  // =============================================
  // 7大维度定义
  // =============================================
  var dimDefs = {
    A: { name: '用眼习惯', icon: '\uD83D\uDCF1', maxScore: 12, colorClass: 'c1',
      desc: '长时间近距离用眼是近视加深的首要原因。睫状肌持续紧张，导致眼轴拉长。',
      advice: ['遵循 20-20-20 法则：每用眼20分钟，看20英尺远处20秒', '保持正确读写姿势，一尺一拳一寸', '减少不必要的近距离用眼时间']
    },
    B: { name: '户外活动', icon: '\u2600\uFE0F', maxScore: 6, colorClass: 'c2',
      desc: '户外阳光刺激视网膜释放多巴胺，有效抑制眼轴增长。每天至少2小时户外活动可显著降低近视风险。',
      advice: ['保证每天至少2小时户外活动时间', '课间10分钟尽量走出教室', '周末多安排户外运动，如篮球、羽毛球等']
    },
    C: { name: '遗传因素', icon: '\uD83E\uDDEC', maxScore: 6, colorClass: 'c3',
      desc: '父母双方近视，孩子近视概率显著升高。高度近视遗传倾向更强，需要更加重视预防。',
      advice: ['有家族近视史的儿童应从3岁起建立屈光发育档案', '每3~6个月进行一次专业视力检查', '早发现早干预，不要等到度数深了才重视']
    },
    D: { name: '饮食营养', icon: '\uD83E\uDD57', maxScore: 6, colorClass: 'c4',
      desc: '过多糖分会降低体内钙含量，影响眼球壁弹性。缺乏维生素A、D和钙质不利于眼部发育。',
      advice: ['减少甜食和碳酸饮料的摄入', '多吃深色蔬菜、胡萝卜、蓝莓等护眼食物', '保证每天一杯牛奶，补充钙质']
    },
    E: { name: '用眼环境', icon: '\uD83D\uDCA1', maxScore: 3, colorClass: 'c5',
      desc: '光线过暗或过亮、光线不均匀，都会让眼睛更快疲劳，加速近视发展。',
      advice: ['学习时同时开启房间大灯和护眼台灯', '台灯应放在写字手对侧，避免手部阴影', '选择色温4000K左右的暖白光护眼灯']
    },
    F: { name: '日常习惯', icon: '\uD83D\uDC40', maxScore: 1, colorClass: 'c6',
      desc: '下意识眯眼看东西说明视力可能在下降，是近视加深的早期信号之一，需要引起重视。',
      advice: ['如果经常眯眼看东西，建议尽快做视力检查', '眯眼会增加眼部肌肉疲劳，加速近视发展', '已经配镜的要注意度数是否需要更新']
    },
    G: { name: '视力管理', icon: '\uD83D\uDC68\u200D\u2695\uFE0F', maxScore: 3, colorClass: 'c7',
      desc: '不配镜、不常戴眼镜或度数不准，都会让眼睛更疲劳。定期检查是科学防控的基础。',
      advice: ['发现视力模糊应及时到专业机构检查', '配镜后应坚持佩戴，不要时戴时不戴', '建立屈光发育档案，定期跟踪视力变化']
    }
  };

  var MAX_TOTAL = 37;
  var TOTAL = 15;

  // =============================================
  // 状态（用数组，index直接对应题号0~14）
  // =============================================
  var answers = new Array(TOTAL);
  var ageIndex = 1;
  var currentIndex = 0;
  var switching = false; // 防止快速连点

  // =============================================
  // 构建当前题目列表
  // =============================================
  function buildQuestions() {
    var isChild = (ageIndex === 0 || ageIndex === 1);
    return [
      Q1,
      Q2,
      Q3_branches[ageIndex],
      Q4,
      isChild ? Q5_branches.child : Q5_branches.adult,
      Q6,
      Q7,
      isChild ? Q8_branches.child : Q8_branches.adult,
      Q9,
      Q10,
      Q11,
      Q12,
      Q13,
      Q14,
      Q15
    ];
  }

  // =============================================
  // DOM 引用（只获取一次，避免反复查询）
  // =============================================
  var dom = {};
  function cacheDom() {
    dom.startPage = document.getElementById('startPage');
    dom.progressWrap = document.getElementById('progressWrap');
    dom.progressBar = document.getElementById('progressBar');
    dom.progressText = document.getElementById('progressText');
    dom.quizPage = document.getElementById('quizPage');
    dom.questionCard = document.getElementById('questionCard');
    dom.questionNum = document.getElementById('questionNum');
    dom.branchHint = document.getElementById('branchHint');
    dom.questionText = document.getElementById('questionText');
    dom.optionsContainer = document.getElementById('optionsContainer');
    dom.btnBack = document.getElementById('btnBack');
    dom.resultPage = document.getElementById('resultPage');
  }

  // =============================================
  // 渲染题目
  // =============================================
  function renderQuestion(index, direction) {
    currentIndex = index;
    var q = buildQuestions()[index];

    // 进度
    dom.progressBar.style.width = ((index + 1) / TOTAL * 100) + '%';
    dom.progressText.textContent = (index + 1) + ' / ' + TOTAL;

    // 题目内容
    dom.questionNum.textContent = q.displayNum || ('\u7B2C ' + (index + 1) + ' \u9898');
    dom.questionText.textContent = q.text;

    // 分支提示
    if (q.hint) {
      dom.branchHint.innerHTML = '<span class="question-branch-hint">' + q.hint + '</span>';
    } else {
      dom.branchHint.innerHTML = '';
    }

    // 选项
    var labels = ['A', 'B', 'C', 'D'];
    var saved = answers[index];
    dom.optionsContainer.innerHTML = '';

    for (var i = 0; i < q.options.length; i++) {
      (function(idx) {
        var opt = q.options[idx];
        var btn = document.createElement('button');
        btn.className = 'option-btn' + (saved === idx ? ' selected' : '');
        btn.innerHTML = '<span class="opt-circle">' + labels[idx] + '</span><span>' + opt.label + '</span>';
        btn.addEventListener('click', function() { onSelect(idx); });
        dom.optionsContainer.appendChild(btn);
      })(i);
    }

    // 上一题按钮
    if (index === 0) {
      dom.btnBack.classList.add('hidden');
    } else {
      dom.btnBack.classList.remove('hidden');
    }

    // 确保答题页可见
    dom.quizPage.style.display = 'block';
    window.scrollTo(0, 0);

    // 跳转动画
    if (direction) {
      var card = dom.questionCard;
      card.classList.remove('slide-in-right', 'slide-in-left');
      card.classList.add(direction === 'next' ? 'slide-in-right' : 'slide-in-left');
      setTimeout(function() { card.classList.remove('slide-in-right', 'slide-in-left'); }, 260);
    }
  }

  // =============================================
  // 选择选项 → 自动跳转
  // =============================================
  function onSelect(optIdx) {
    if (switching) return; // 防连点
    switching = true;

    var index = currentIndex;
    answers[index] = optIdx;

    // 如果是第2题（index=1），更新年龄段并清除后续答案
    if (index === 1) {
      ageIndex = optIdx;
      for (var k = 2; k < TOTAL; k++) {
        answers[k] = undefined;
      }
    }

    // 高亮选中项
    var btns = dom.optionsContainer.querySelectorAll('.option-btn');
    for (var b = 0; b < btns.length; b++) {
      if (b === optIdx) {
        btns[b].classList.add('selected');
      } else {
        btns[b].classList.remove('selected');
      }
      btns[b].style.pointerEvents = 'none'; // 禁止重复点击
    }

    // 滑出动画
    var card = dom.questionCard;
    if (index < TOTAL - 1) {
      card.classList.add('slide-out-left');
      setTimeout(function() {
        card.classList.remove('slide-out-left');
        renderQuestion(index + 1, 'next');
        switching = false;
      }, 280);
    } else {
      // 最后一题，显示结果
      setTimeout(function() {
        showResult();
        switching = false;
      }, 500);
    }
  }

  // =============================================
  // 上一题
  // =============================================
  function onBack() {
    if (switching || currentIndex <= 0) return;
    switching = true;

    var card = dom.questionCard;
    card.classList.add('slide-out-right');
    setTimeout(function() {
      card.classList.remove('slide-out-right');
      renderQuestion(currentIndex - 1, 'prev');
      switching = false;
    }, 280);
  }

  // =============================================
  // 开始测评
  // =============================================
  function startQuiz() {
    answers = new Array(TOTAL);
    ageIndex = 1;
    currentIndex = 0;
    switching = false;

    dom.startPage.classList.add('hidden');
    dom.progressWrap.classList.remove('hidden');
    dom.resultPage.style.display = 'none';
    dom.resultPage.innerHTML = '';

    renderQuestion(0);
  }

  // =============================================
  // 计算结果
  // =============================================
  function calculateScores() {
    var scores = { A: 0, B: 0, C: 0, D: 0, E: 0, F: 0, G: 0 };
    var questions = buildQuestions();
    for (var i = 0; i < TOTAL; i++) {
      if (answers[i] === undefined || answers[i] === null) continue;
      var opt = questions[i].options[answers[i]];
      if (opt.cause && dimDefs[opt.cause]) {
        scores[opt.cause] += opt.value;
      }
    }
    return scores;
  }

  function showResult() {
    dom.quizPage.style.display = 'none';
    dom.progressWrap.classList.add('hidden');
    dom.resultPage.style.display = 'block';

    var scores = calculateScores();
    var sorted = Object.keys(scores).map(function(k) { return [k, scores[k]]; });
    sorted.sort(function(a, b) { return b[1] - a[1]; });

    var totalScore = 0;
    for (var s = 0; s < sorted.length; s++) totalScore += sorted[s][1];

    var riskLevel, riskClass, riskEmoji;
    var lowThresh = Math.round(MAX_TOTAL * 0.35);
    var highThresh = Math.round(MAX_TOTAL * 0.7);
    if (totalScore <= lowThresh) {
      riskLevel = '低风险'; riskClass = 'risk-low'; riskEmoji = '\uD83D\uDFE2';
    } else if (totalScore <= highThresh) {
      riskLevel = '中等风险'; riskClass = 'risk-medium'; riskEmoji = '\uD83D\uDFE1';
    } else {
      riskLevel = '高风险'; riskClass = 'risk-high'; riskEmoji = '\uD83D\uDD34';
    }

    var dimChips = [];
    for (var d = 0; d < sorted.length; d++) {
      var key = sorted[d][0], score = sorted[d][1], max = dimDefs[key].maxScore;
      var pct = max > 0 ? Math.round(score / max * 100) : 0;
      dimChips.push({ key: key, score: score, max: max, pct: pct });
    }

    var topCauses = dimChips.filter(function(dc) { return dc.score > 0; }).slice(0, 3);
    if (topCauses.length === 0) topCauses = dimChips.slice(0, 3);

    var chipsHtml = '';
    for (var c = 0; c < dimChips.length; c++) {
      var dc = dimChips[c];
      var bg = dc.pct <= 30 ? '#f0fdf4' : dc.pct <= 60 ? '#fefce8' : '#fef2f2';
      var fg = dc.pct <= 30 ? '#16a34a' : dc.pct <= 60 ? '#ca8a04' : '#dc2626';
      chipsHtml += '<span class="score-chip" style="background:' + bg + ';color:' + fg + '">' +
        '<span class="chip-icon">' + dimDefs[dc.key].icon + '</span>' +
        dimDefs[dc.key].name + ' ' + dc.score + '/' + dc.max + '</span>';
    }

    var causesHtml = '';
    for (var t = 0; t < topCauses.length; t++) {
      var tc = topCauses[t];
      var def = dimDefs[tc.key];
      causesHtml += '<div class="cause-item"><div class="ci-icon ' + def.colorClass + '">' + def.icon + '</div>' +
        '<div><h4>' + def.name + '（风险 ' + Math.min(tc.pct, 100) + '%）</h4><p>' + def.desc + '</p></div></div>';
    }

    var adviceList = [];
    for (var a = 0; a < topCauses.length; a++) {
      var advs = dimDefs[topCauses[a].key].advice;
      for (var ai = 0; ai < advs.length; ai++) adviceList.push(advs[ai]);
    }
    var adviceHtml = '';
    for (var al = 0; al < Math.min(adviceList.length, 8); al++) {
      adviceHtml += '<li>' + adviceList[al] + '</li>';
    }

    var q1Answer = answers[0];
    var firstTimeMsg = '';
    if (q1Answer === 0) {
      firstTimeMsg = '<div style="background:#f0f9ff;border:1px solid #bae6fd;border-radius:12px;padding:14px;margin-bottom:16px;font-size:13px;color:#0369a1;">' +
        '\uD83D\uDCCC <b>第一次配镜提示：</b>建议到专业视光中心做全面验光检查，包括散瞳验光，确保度数准确。不建议直接在普通眼镜店快速配镜。</div>';
    }

    var html =
      '<div class="result-card">' +
        '<div class="result-header">' +
          '<div class="result-icon">' + riskEmoji + '</div>' +
          '<h2>测评结果</h2>' +
          '<span class="risk-level ' + riskClass + '">' + riskLevel + ' \xB7 \u603B\u5206 ' + totalScore + '/' + MAX_TOTAL + '</span>' +
        '</div>' +
        '<div class="score-detail">' + chipsHtml + '</div>' +
        firstTimeMsg +
        '<div class="cause-section"><h3>\uD83D\uDCC8 \u4E3B\u8981\u8FD1\u89C6\u6210\u56E0\uFF08\u6309\u98CE\u9669\u6392\u5E8F\uFF09</h3>' + causesHtml + '</div>' +
        '<div class="cause-section"><h3>\uD83D\uDCA1 \u9488\u5BF9\u6027\u62A4\u773C\u5EFA\u8BAE</h3>' +
          '<div class="advice-box"><h3>\u79D1\u5B66\u7684\u62A4\u773C\u65B9\u6CD5</h3><ul>' + adviceHtml + '</ul></div>' +
        '</div>' +
      '</div>' +
      '<div class="cta-card">' +
        '<h3>\u5EFA\u8BAE\u5230\u4E13\u4E1A\u89C6\u5149\u4E2D\u5FC3\u505A\u5168\u9762\u68C0\u67E5</h3>' +
        '<p>\u5728\u7EBF\u6D4B\u8BC4\u4EC5\u4F9B\u53C2\u8003\uFF0C\u79D1\u5B66\u9632\u63A7\u9700\u8981\u4E13\u4E1A\u68C0\u6D4B</p>' +
        '<div style="display:flex;gap:12px;justify-content:center;flex-wrap:wrap;">' +
          '<a class="btn-cta" href="tel:19975821356">\uD83D\uDCDE 19975821356</a>' +
          '<a class="btn-cta" href="weixin://">\uD83D\uDCAC \u52A0\u5FAE\u4FE1</a>' +
        '</div>' +
      '</div>' +
      '<button class="btn-restart" id="btnRestart">\u91CD\u65B0\u6D4B\u8BC4</button>' +
      '<div class="disclaimer">' +
        '\u26A0\uFE0F \u672C\u6D4B\u8BC4\u4EC5\u4F9B\u53C2\u8003\uFF0C\u4E0D\u6784\u6210\u533B\u7597\u8BCA\u65AD\u5EFA\u8BAE\u3002<br>' +
        '\u5982\u6709\u89C6\u529B\u95EE\u9898\uFF0C\u8BF7\u53CA\u65F6\u524D\u5F80\u4E13\u4E1A\u773C\u79D1/\u89C6\u5149\u673A\u6784\u68C0\u67E5\u3002<br>' +
        '\u00A9 \u7EF4\u89C6\u773C\u955C' +
      '</div>';

    dom.resultPage.innerHTML = html;

    // 绑定重新测评按钮
    document.getElementById('btnRestart').addEventListener('click', restartQuiz);

    window.scrollTo(0, 0);
  }

  function restartQuiz() {
    dom.resultPage.style.display = 'none';
    dom.resultPage.innerHTML = '';
    dom.startPage.classList.remove('hidden');
    window.scrollTo(0, 0);
  }

  // =============================================
  // 初始化
  // =============================================
  document.addEventListener('DOMContentLoaded', function() {
    cacheDom();
    document.getElementById('btnStart').addEventListener('click', startQuiz);
    dom.btnBack.addEventListener('click', onBack);
  });

})();
</script>
</body>
</html>
